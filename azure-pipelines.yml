trigger:
- main

pool:
  vmImage: 'windows-2022'

variables:
  buildConfiguration: 'Release'
  proyecto: 'LogisticaEnvios/LogisticaEnvios/LogisticaEnvios.csproj'

steps:
- task: UseDotNet@2
  displayName: 'ASP.NET Core (.NET 8)'
  inputs:
    packageType: 'sdk'
    version: '8.0.421'

- script: dotnet restore "$(proyecto)"
  displayName: 'dotnet restore'

- script: dotnet build --configuration "$(buildConfiguration)" "$(proyecto)"
  displayName: 'dotnet build $(buildConfiguration)'

# EF Core CLI para generar script SQL de migraciones (si tienes Migrations creadas)
- task: CmdLine@2
  displayName: 'Installing EF Core CLI'
  inputs:
    script: 'dotnet tool install --global dotnet-ef'

- task: DotNetCoreCLI@2
  displayName: 'Publishing App...'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '$(proyecto)'
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --runtime win-x86 --self-contained false'
    zipAfterPublish: false
    modifyOutputPath: false

- task: PublishBuildArtifacts@1
  displayName: 'Publish artifacts'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'